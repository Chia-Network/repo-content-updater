name: Prettier/Actionlint Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bin/repo-content-updater .

      - name: Expand templates
        run: |
          mkdir -p template-expanded
          for f in templates/*; do
            filename=$(basename "$f")
            ./bin/repo-content-updater debug-template "$filename" --output "template-expanded/$filename"
          done

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: lts/*

      - name: Install Prettier
        run: npm install -g prettier

      - name: Run Prettier Check
        id: prettier
        run: prettier --check --ignore-unknown template-expanded/
        continue-on-error: true

      - name: Show Prettier diff
        if: steps.prettier.outcome == 'failure'
        run: |
          cp -r template-expanded template-expanded-original
          prettier --write --ignore-unknown template-expanded/
          git diff --no-index template-expanded-original/ template-expanded/ || true

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
        env:
          GOTOOLCHAIN: auto

      - name: Run actionlint on workflow templates
        id: actionlint
        run: |
          workflow_files=$(grep -rl "^jobs:" template-expanded/ || true)
          if [ -n "$workflow_files" ]; then
            actionlint \
              -ignore "string should not be empty" \
              -ignore "SC2002:" \
              $workflow_files
          fi
        continue-on-error: true

      - name: Fail if any check failed
        if: steps.prettier.outcome == 'failure' || steps.actionlint.outcome == 'failure'
        run: exit 1
